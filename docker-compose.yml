version: "3.9"

services:

  # ── Infrastructure ─────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.3
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 15s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.1
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./monitoring/grafana:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

  # ── Application ────────────────────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      KAFKA_BROKER: kafka:9092
      ES_HOST: http://elasticsearch:9200
      QDRANT_HOST: http://qdrant:6333
      REDIS_HOST: redis
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  es_consumer:
    build:
      context: .
      dockerfile: api/Dockerfile
    command: python -m kafka.consumers.elasticsearch_consumer
    env_file: .env
    environment:
      KAFKA_BROKER: kafka:9092
      ES_HOST: http://elasticsearch:9200
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  vector_consumer:
    build:
      context: .
      dockerfile: api/Dockerfile
    command: python -m kafka.consumers.vector_consumer
    env_file: .env
    environment:
      KAFKA_BROKER: kafka:9092
      QDRANT_HOST: http://qdrant:6333
    depends_on:
      kafka:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  anomaly_consumer:
    build:
      context: .
      dockerfile: api/Dockerfile
    command: python -m kafka.consumers.anomaly_consumer
    env_file: .env
    environment:
      KAFKA_BROKER: kafka:9092
    depends_on:
      - kafka
      - api

volumes:
  qdrant_data:
